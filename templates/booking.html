{% extends "base.html" %} {% block title %}Book a Session | StillPhotos{%
endblock %} {% block content %}

<section class="booking-section">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <h2>Book a Session</h2>
  <p>
    Please fill out the form below to book your session. You will receive a
    confirmation email shortly after submission.
  </p>
   <div id="calendar"></div>
  <form method="POST" action="{{ url_for('booking') }}" class="booking-form">
    <label for="name">Full Name</label>
    <input
      type="text"
      id="name"
      name="name"
      placeholder="Your Full Name"
      required
    />

    <label for="email">Email Address</label>
    <input
      type="email"
      id="email"
      name="email"
      placeholder="you@example.com"
      required
    />

    <label for="phone">Phone Number</label>
    <input
      type="tel"
      id="phone"
      name="phone"
      placeholder="+123 456 7890"
      required
    />

    <label for="date">Preferred Date</label>
    <input type="date" id="date" name="date" required min="{{ min_date }}" />

  <label for="time_slot">Select Time</label>
  <select id="time_slot" name="time_slot" required>
  <option value="">Select a time slot</option>
  <option value="09:00 AM">09:00 AM</option>
  <option value="11:00 AM">11:00 AM</option>
  <option value="01:00 PM">01:00 PM</option>
  <option value="03:00 PM">03:00 PM</option>
  <option value="05:00 PM">05:00 PM</option>
</select>
    <label for="package">Select Package</label>
    <select id="package" name="package" required>
      <option value="">-- Choose a package --</option>
      <option value="wedding">Wedding</option>
      <option value="portrait">Portrait</option>
      <option value="fashion">Fashion</option>
      <option value="birthday">Birthday</option>
      <option value="ceremony">Ceremony</option>
    </select>

    <label for="message">Additional Information</label>
    <textarea
      id="message"
      name="message"
      placeholder="Tell us more about your shoot"
      required
    ></textarea>

    <button type="submit" class="btn-primary">Submit Booking</button>
  </form>
  <script>
const bookedSlots = {{ booked_slots | tojson }};

const dateInput = document.getElementById("date");
const timeSelect = document.getElementById("time_slot");

dateInput.addEventListener("change", function() {

    const selectedDate = this.value;

    const options = timeSelect.querySelectorAll("option");

    options.forEach(option => {
        option.disabled = false;
    });

    bookedSlots.forEach(slot => {

        if (slot.date === selectedDate) {

            options.forEach(option => {
                if(option.value === slot.time){
                    option.disabled = true;
                }
            });

        }

    });

});
</script>
  <script>
document.getElementById("date").min = new Date().toISOString().split("T")[0];
</script>
<script>
document.addEventListener('DOMContentLoaded', function () {

  const bookedSlots = {{ booked_slots | tojson }};

  const calendarEl = document.getElementById('calendar');

  const events = bookedSlots.map(slot => ({
    title: "Booked",
    start: slot.date,
    color: "red"
  }));

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    selectable: true,
    events: events,

    dateClick: function(info) {
      document.getElementById("date").value = info.dateStr;
      window.scrollTo({ top: document.querySelector(".booking-form").offsetTop, behavior: "smooth" });
    }

  });

  calendar.render();

});
</script>
</section>

{% endblock %}
