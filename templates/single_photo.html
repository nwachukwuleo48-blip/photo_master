{% extends "base.html" %} {% block content %}
<section class="photo-page">
  <h2>{{ photo.title }}</h2>

  <img
    src="{{ url_for('portfolio_file', filename=photo.filename) }}"
    style="width: 100%; max-width: 900px"
    alt="{{ photo.title }}"
  />

  <p>Category: {{ photo.category }}</p>

  <a href="{{ url_for('home') }}" class="btn-primary"> ← Back to Portfolio </a>
  {% if is_admin %}
  <div class="admin-actions">
    <a href="{{ url_for('edit_photo', id=photo.id) }}">Edit</a>
    <a href="{{ url_for('delete_photo', id=photo.id) }}">Delete</a>
    <a
      href="{{ url_for('portfolio_file', filename=photo.filename, download=1) }}"
      download
      class="download-btn"
    >
      Download
    </a>
  </div>
  {% endif %}
</section>
{% endblock %}
